services:
  - type: web
    name: phishing-xai-demo
    env: python
    plan: free
    buildCommand: pip install -r deploy/requirements.txt
    startCommand: uvicorn deploy.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DEPLOY_BUNDLE_DIR
        value: deploy/bundle
